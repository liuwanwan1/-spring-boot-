<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库进销存管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #4e73df;
            --secondary-color: #858796;
            --success-color: #1cc88a;
            --info-color: #36b9cc;
            --warning-color: #f6c23e;
            --danger-color: #e74a3b;
        }
        
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fc;
        }
        
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: linear-gradient(180deg, #4e73df 10%, #224abe 100%);
            color: white;
            z-index: 1000;
            overflow-y: auto;
            transition: all 0.3s;
        }
        
        .sidebar-brand {
            padding: 1.5rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-nav {
            padding: 0;
            list-style: none;
        }
        
        .sidebar-nav li {
            padding: 0;
        }
        
        .sidebar-nav a {
            display: block;
            padding: 1rem 1.5rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }
        
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-left-color: white;
        }
        
        .sidebar-nav i {
            margin-right: 0.75rem;
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 1.5rem;
            min-height: 100vh;
        }
        
        .topbar {
            background: white;
            padding: 1rem 1.5rem;
            margin: -1.5rem -1.5rem 1.5rem -1.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card {
            border: none;
            border-radius: 0.5rem;
            box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15);
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            background: white;
            border-bottom: 1px solid #e3e6f0;
            padding: 1rem 1.25rem;
            font-weight: 700;
            color: #4e73df;
        }
        
        .stat-card {
            border-left: 4px solid;
        }
        
        .stat-card.primary { border-left-color: var(--primary-color); }
        .stat-card.success { border-left-color: var(--success-color); }
        .stat-card.info { border-left-color: var(--info-color); }
        .stat-card.warning { border-left-color: var(--warning-color); }
        .stat-card.danger { border-left-color: var(--danger-color); }
        
        .stat-card .card-body {
            padding: 1.25rem;
        }
        
        .stat-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #5a5c69;
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table th {
            border-top: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #4e73df;
        }
        
        .btn-action {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        
        .badge-status {
            padding: 0.5em 0.75em;
            font-size: 0.75em;
        }
        
        .footer {
            text-align: center;
            padding: 1rem;
            color: var(--secondary-color);
            font-size: 0.85rem;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-box-seam"></i> 仓库管理系统
        </div>
        <ul class="sidebar-nav">
            <li>
                <a th:href="@{/dashboard}" th:class="${#httpServletRequest != null and #httpServletRequest.requestURI == '/dashboard'} ? 'active' : ''">
                    <i class="bi bi-speedometer2"></i> 仪表盘
                </a>
            </li>
            <li>
                <a th:href="@{/products}">
                    <i class="bi bi-box"></i> 商品管理
                </a>
            </li>
            <li>
                <a th:href="@{/suppliers}">
                    <i class="bi bi-truck"></i> 供应商管理
                </a>
            </li>
            <li>
                <a th:href="@{/customers}">
                    <i class="bi bi-people"></i> 客户管理
                </a>
            </li>
            <li>
                <a th:href="@{/purchase-orders}">
                    <i class="bi bi-cart-plus"></i> 采购管理
                </a>
            </li>
            <li>
                <a th:href="@{/sales-orders}">
                    <i class="bi bi-cart-check"></i> 销售管理
                </a>
            </li>
            <li>
                <a th:href="@{/products/low-stock}">
                    <i class="bi bi-exclamation-triangle"></i> 库存预警
                </a>
            </li>
            <li class="mt-3">
                <a th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <h5 class="m-0">仓库进销存管理系统</h5>
            <div>
                <span class="text-muted">欢迎, </span>
                <span class="fw-bold">管理员</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row">
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card primary">
                    <div class="card-body">
                        <div class="stat-label text-primary">总商品数</div>
                        <div class="stat-value" th:text="${stats.totalProducts}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card success">
                    <div class="card-body">
                        <div class="stat-label text-success">供应商</div>
                        <div class="stat-value" th:text="${stats.totalSuppliers}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card info">
                    <div class="card-body">
                        <div class="stat-label text-info">客户</div>
                        <div class="stat-value" th:text="${stats.totalCustomers}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card warning">
                    <div class="card-body">
                        <div class="stat-label text-warning">库存预警</div>
                        <div class="stat-value" th:text="${stats.lowStockCount}">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Financial Stats -->
        <div class="row">
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card primary">
                    <div class="card-body">
                        <div class="stat-label text-primary">今日采购</div>
                        <div class="stat-value" th:text="'¥' + ${#numbers.formatDecimal(stats.todayPurchaseAmount, 0, 2)}">¥0.00</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card success">
                    <div class="card-body">
                        <div class="stat-label text-success">今日销售</div>
                        <div class="stat-value" th:text="'¥' + ${#numbers.formatDecimal(stats.todaySalesAmount, 0, 2)}">¥0.00</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card info">
                    <div class="card-body">
                        <div class="stat-label text-info">本月采购</div>
                        <div class="stat-value" th:text="'¥' + ${#numbers.formatDecimal(stats.monthPurchaseAmount, 0, 2)}">¥0.00</div>
                    </div>
                </div>
            </div>
            <div class="col-xl-3 col-md-6 mb-4">
                <div class="card stat-card warning">
                    <div class="card-body">
                        <div class="stat-label text-warning">本月销售</div>
                        <div class="stat-value" th:text="'¥' + ${#numbers.formatDecimal(stats.monthSalesAmount, 0, 2)}">¥0.00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pending Orders -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-cart-plus"></i> 待处理采购单
                        <span class="badge bg-warning float-end" th:text="${stats.pendingPurchaseOrders}">0</span>
                    </div>
                    <div class="card-body">
                        <a th:href="@{/purchase-orders}" class="btn btn-primary btn-sm">查看采购单</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-cart-check"></i> 待处理销售单
                        <span class="badge bg-warning float-end" th:text="${stats.pendingSalesOrders}">0</span>
                    </div>
                    <div class="card-body">
                        <a th:href="@{/sales-orders}" class="btn btn-primary btn-sm">查看销售单</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Low Stock Alert -->
        <div class="card" th:if="${not #lists.isEmpty(lowStockProducts)}">
            <div class="card-header bg-warning text-dark">
                <i class="bi bi-exclamation-triangle"></i> 库存预警商品
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>商品编码</th>
                                <th>商品名称</th>
                                <th>当前库存</th>
                                <th>最低库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product : ${lowStockProducts}">
                                <td th:text="${product.code}"></td>
                                <td th:text="${product.name}"></td>
                                <td>
                                    <span class="badge bg-danger" th:text="${product.stockQuantity}"></span>
                                </td>
                                <td th:text="${product.minStock}"></td>
                                <td>
                                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-action btn-sm">查看</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="card" th:if="${not #lists.isEmpty(recentTransactions)}">
            <div class="card-header">
                <i class="bi bi-clock-history"></i> 最近交易记录
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>商品</th>
                                <th>类型</th>
                                <th>数量</th>
                                <th>库存变动</th>
                                <th>关联单号</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tx : ${recentTransactions}">
                                <td th:text="${#temporals.format(tx.transactionTime, 'yyyy-MM-dd HH:mm')}"></td>
                                <td th:text="${tx.product != null ? tx.product.name : ''}"></td>
                                <td>
                                    <span class="badge" 
                                          th:class="${tx.type.name() == 'PURCHASE_IN' or tx.type.name() == 'SALES_RETURN'} ? 'bg-success' : 'bg-danger'"
                                          th:text="${tx.type}"></span>
                                </td>
                                <td th:text="${tx.quantity}"></td>
                                <td th:text="${tx.stockBefore} + ' → ' + ${tx.stockAfter}"></td>
                                <td th:text="${tx.referenceNo}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2024 仓库进销存管理系统 - 基于Spring Boot开发</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
