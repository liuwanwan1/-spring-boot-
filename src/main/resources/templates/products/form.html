<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品表单 - 仓库进销存管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary-color: #4e73df; }
        body { font-family: 'Nunito', sans-serif; background-color: #f8f9fc; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #4e73df 10%, #224abe 100%); color: white; z-index: 1000; overflow-y: auto; }
        .sidebar-brand { padding: 1.5rem; text-align: center; font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { padding: 0; list-style: none; }
        .sidebar-nav a { display: block; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color: white; background: rgba(255,255,255,0.1); border-left-color: white; }
        .sidebar-nav i { margin-right: 0.75rem; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; min-height: 100vh; }
        .topbar { background: white; padding: 1rem 1.5rem; margin: -1.5rem -1.5rem 1.5rem -1.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 0.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); margin-bottom: 1.5rem; }
        .card-header { background: white; border-bottom: 1px solid #e3e6f0; padding: 1rem 1.25rem; font-weight: 700; color: #4e73df; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam"></i> 仓库管理系统</div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
            <li><a th:href="@{/products}" class="active"><i class="bi bi-box"></i> 商品管理</a></li>
            <li><a th:href="@{/suppliers}"><i class="bi bi-truck"></i> 供应商管理</a></li>
            <li><a th:href="@{/customers}"><i class="bi bi-people"></i> 客户管理</a></li>
            <li><a th:href="@{/purchase-orders}"><i class="bi bi-cart-plus"></i> 采购管理</a></li>
            <li><a th:href="@{/sales-orders}"><i class="bi bi-cart-check"></i> 销售管理</a></li>
            <li><a th:href="@{/products/low-stock}"><i class="bi bi-exclamation-triangle"></i> 库存预警</a></li>
            <li class="mt-3"><a th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <h5 class="m-0" th:text="${product.id != null} ? '编辑商品' : '新增商品'">商品表单</h5>
            <a th:href="@{/products}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> 返回</a>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="${product.id != null} ? @{/products/{id}(id=${product.id})} : @{/products}" th:object="${product}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">商品编码 *</label>
                            <input type="text" class="form-control" th:field="*{code}" required maxlength="50">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">商品名称 *</label>
                            <input type="text" class="form-control" th:field="*{name}" required maxlength="100">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">分类</label>
                            <input type="text" class="form-control" th:field="*{category}" list="categoryList" maxlength="50">
                            <datalist id="categoryList">
                                <option th:each="cat : ${categories}" th:value="${cat}">
                            </datalist>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">品牌</label>
                            <input type="text" class="form-control" th:field="*{brand}" maxlength="50">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">描述</label>
                            <textarea class="form-control" th:field="*{description}" rows="2" maxlength="255"></textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">规格</label>
                            <input type="text" class="form-control" th:field="*{specification}" maxlength="50">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">单位</label>
                            <input type="text" class="form-control" th:field="*{unit}" placeholder="如：件、箱、kg" maxlength="50">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">进货价 *</label>
                            <input type="number" class="form-control" th:field="*{purchasePrice}" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">销售价 *</label>
                            <input type="number" class="form-control" th:field="*{sellingPrice}" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">初始库存</label>
                            <input type="number" class="form-control" th:field="*{stockQuantity}" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">最低库存预警</label>
                            <input type="number" class="form-control" th:field="*{minStock}" min="0" value="10">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">最高库存限制</label>
                            <input type="number" class="form-control" th:field="*{maxStock}" min="0" value="1000">
                        </div>
                        <div class="col-md-12 mb-3">
                            <label class="form-label">图片URL</label>
                            <input type="url" class="form-control" th:field="*{imageUrl}" maxlength="255">
                        </div>
                        <div class="col-md-6 mb-3" th:if="${product.id != null}">
                            <label class="form-label">状态</label>
                            <select class="form-select" th:field="*{status}">
                                <option value="ACTIVE">正常</option>
                                <option value="INACTIVE">停用</option>
                                <option value="DISCONTINUED">停产</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> 保存</button>
                        <a th:href="@{/products}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
