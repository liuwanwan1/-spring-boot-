<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售管理 - 仓库进销存管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary-color: #4e73df; }
        body { font-family: 'Nunito', sans-serif; background-color: #f8f9fc; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #4e73df 10%, #224abe 100%); color: white; z-index: 1000; overflow-y: auto; }
        .sidebar-brand { padding: 1.5rem; text-align: center; font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { padding: 0; list-style: none; }
        .sidebar-nav a { display: block; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color: white; background: rgba(255,255,255,0.1); border-left-color: white; }
        .sidebar-nav i { margin-right: 0.75rem; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; min-height: 100vh; }
        .topbar { background: white; padding: 1rem 1.5rem; margin: -1.5rem -1.5rem 1.5rem -1.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 0.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); margin-bottom: 1.5rem; }
        .card-header { background: white; border-bottom: 1px solid #e3e6f0; padding: 1rem 1.25rem; font-weight: 700; color: #4e73df; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam"></i> 仓库管理系统</div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
            <li><a th:href="@{/products}"><i class="bi bi-box"></i> 商品管理</a></li>
            <li><a th:href="@{/suppliers}"><i class="bi bi-truck"></i> 供应商管理</a></li>
            <li><a th:href="@{/customers}"><i class="bi bi-people"></i> 客户管理</a></li>
            <li><a th:href="@{/purchase-orders}"><i class="bi bi-cart-plus"></i> 采购管理</a></li>
            <li><a th:href="@{/sales-orders}" class="active"><i class="bi bi-cart-check"></i> 销售管理</a></li>
            <li><a th:href="@{/products/low-stock}"><i class="bi bi-exclamation-triangle"></i> 库存预警</a></li>
            <li class="mt-3"><a th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <h5 class="m-0">销售管理</h5>
            <div><a th:href="@{/sales-orders/new}" class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> 新增销售单</a></div>
        </div>

        <div class="card">
            <div class="card-header">
                <form class="row g-3" th:action="@{/sales-orders}" method="get">
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="orderNo" placeholder="销售单号" th:value="${orderNo}">
                    </div>
                    <div class="col-md-2">
                        <select class="form-select" name="status">
                            <option value="">全部状态</option>
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s.name() == status}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> 搜索</button>
                        <a th:href="@{/sales-orders}" class="btn btn-secondary">重置</a>
                    </div>
                </form>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>销售单号</th>
                                <th>客户</th>
                                <th>总金额</th>
                                <th>已收金额</th>
                                <th>状态</th>
                                <th>订单日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td><a th:href="@{/sales-orders/{id}(id=${order.id})}" th:text="${order.orderNo}"></a></td>
                                <td th:text="${order.customer != null ? order.customer.name : ''}"></td>
                                <td th:text="'¥' + ${#numbers.formatDecimal(order.totalAmount, 0, 2)}"></td>
                                <td th:text="'¥' + ${#numbers.formatDecimal(order.paidAmount, 0, 2)}"></td>
                                <td>
                                    <span class="badge" th:class="${order.status.name() == 'PENDING'} ? 'bg-warning' : (${order.status.name() == 'APPROVED'} ? 'bg-info' : (${order.status.name() == 'SHIPPED'} ? 'bg-primary' : (${order.status.name() == 'COMPLETED'} ? 'bg-success' : 'bg-secondary')))" th:text="${order.status}"></span>
                                </td>
                                <td th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd')}"></td>
                                <td>
                                    <a th:href="@{/sales-orders/{id}(id=${order.id})}" class="btn btn-info btn-sm"><i class="bi bi-eye"></i></a>
                                    <a th:if="${order.status.name() == 'PENDING'}" th:href="@{/sales-orders/{id}/approve(id=${order.id})}" class="btn btn-success btn-sm" onclick="return confirm('确认审批？')"><i class="bi bi-check"></i></a>
                                    <a th:if="${order.status.name() == 'APPROVED'}" th:href="@{/sales-orders/{id}/ship(id=${order.id})}" class="btn btn-primary btn-sm" onclick="return confirm('确认发货出库？')"><i class="bi bi-box-arrow-up"></i></a>
                                    <a th:if="${order.status.name() == 'SHIPPED'}" th:href="@{/sales-orders/{id}/complete(id=${order.id})}" class="btn btn-success btn-sm" onclick="return confirm('确认完成？')"><i class="bi bi-check-all"></i></a>
                                    <a th:if="${order.status.name() != 'COMPLETED'}" th:href="@{/sales-orders/{id}/cancel(id=${order.id})}" class="btn btn-danger btn-sm" onclick="return confirm('确认取消？')"><i class="bi bi-x"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <nav th:if="${orders.totalPages > 1}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:class="${orders.first} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/sales-orders(page=${orders.number - 1}, size=${orders.size}, orderNo=${orderNo}, status=${status})}">上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}" th:class="${i == orders.number} ? 'active' : ''">
                            <a class="page-link" th:href="@{/sales-orders(page=${i}, size=${orders.size}, orderNo=${orderNo}, status=${status})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:class="${orders.last} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/sales-orders(page=${orders.number + 1}, size=${orders.size}, orderNo=${orderNo}, status=${status})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
