<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 仓库进销存管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --sidebar-width: 260px; --primary-color: #4e73df; }
        body { font-family: 'Nunito', sans-serif; background-color: #f8f9fc; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(180deg, #4e73df 10%, #224abe 100%); color: white; z-index: 1000; overflow-y: auto; }
        .sidebar-brand { padding: 1.5rem; text-align: center; font-size: 1.2rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-nav { padding: 0; list-style: none; }
        .sidebar-nav a { display: block; padding: 1rem 1.5rem; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.3s; border-left: 4px solid transparent; }
        .sidebar-nav a:hover, .sidebar-nav a.active { color: white; background: rgba(255,255,255,0.1); border-left-color: white; }
        .sidebar-nav i { margin-right: 0.75rem; width: 20px; text-align: center; }
        .main-content { margin-left: var(--sidebar-width); padding: 1.5rem; min-height: 100vh; }
        .topbar { background: white; padding: 1rem 1.5rem; margin: -1.5rem -1.5rem 1.5rem -1.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); display: flex; justify-content: space-between; align-items: center; }
        .card { border: none; border-radius: 0.5rem; box-shadow: 0 0.15rem 1.75rem 0 rgba(58,59,69,0.15); margin-bottom: 1.5rem; }
        .card-header { background: white; border-bottom: 1px solid #e3e6f0; padding: 1rem 1.25rem; font-weight: 700; color: #4e73df; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam"></i> 仓库管理系统</div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
            <li><a th:href="@{/products}" class="active"><i class="bi bi-box"></i> 商品管理</a></li>
            <li><a th:href="@{/suppliers}"><i class="bi bi-truck"></i> 供应商管理</a></li>
            <li><a th:href="@{/customers}"><i class="bi bi-people"></i> 客户管理</a></li>
            <li><a th:href="@{/purchase-orders}"><i class="bi bi-cart-plus"></i> 采购管理</a></li>
            <li><a th:href="@{/sales-orders}"><i class="bi bi-cart-check"></i> 销售管理</a></li>
            <li><a th:href="@{/products/low-stock}"><i class="bi bi-exclamation-triangle"></i> 库存预警</a></li>
            <li class="mt-3"><a th:href="@{/logout}"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <h5 class="m-0">商品详情</h5>
            <div>
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm"><i class="bi bi-pencil"></i> 编辑</a>
                <a th:href="@{/products}" class="btn btn-secondary btn-sm"><i class="bi bi-arrow-left"></i> 返回</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header"><i class="bi bi-box"></i> 商品信息</div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr><td width="150"><strong>商品编码:</strong></td><td th:text="${product.code}"></td></tr>
                            <tr><td><strong>商品名称:</strong></td><td th:text="${product.name}"></td></tr>
                            <tr><td><strong>分类:</strong></td><td th:text="${product.category}"></td></tr>
                            <tr><td><strong>品牌:</strong></td><td th:text="${product.brand}"></td></tr>
                            <tr><td><strong>规格:</strong></td><td th:text="${product.specification}"></td></tr>
                            <tr><td><strong>单位:</strong></td><td th:text="${product.unit}"></td></tr>
                            <tr><td><strong>描述:</strong></td><td th:text="${product.description}"></td></tr>
                            <tr><td><strong>进货价:</strong></td><td th:text="'¥' + ${#numbers.formatDecimal(product.purchasePrice, 0, 2)}"></td></tr>
                            <tr><td><strong>销售价:</strong></td><td th:text="'¥' + ${#numbers.formatDecimal(product.sellingPrice, 0, 2)}"></td></tr>
                            <tr><td><strong>当前库存:</strong></td><td><span class="badge" th:class="${product.stockQuantity <= product.minStock} ? 'bg-danger' : 'bg-success'" th:text="${product.stockQuantity}"></span></td></tr>
                            <tr><td><strong>最低库存:</strong></td><td th:text="${product.minStock}"></td></tr>
                            <tr><td><strong>最高库存:</strong></td><td th:text="${product.maxStock}"></td></tr>
                            <tr><td><strong>状态:</strong></td><td><span class="badge" th:class="${product.status.name() == 'ACTIVE'} ? 'bg-success' : (${product.status.name() == 'INACTIVE'} ? 'bg-warning' : 'bg-secondary')" th:text="${product.status}"></span></td></tr>
                            <tr><td><strong>创建时间:</strong></td><td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
                            <tr><td><strong>更新时间:</strong></td><td th:text="${#temporals.format(product.updatedAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><i class="bi bi-image"></i> 商品图片</div>
                    <div class="card-body text-center">
                        <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" class="img-fluid rounded" alt="商品图片">
                        <div th:if="!${product.imageUrl}" class="text-muted py-5"><i class="bi bi-image" style="font-size: 3rem;"></i><br>暂无图片</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
